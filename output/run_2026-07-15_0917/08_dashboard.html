<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Canvas — Дашборд: ИАфр РАН</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display:flex; height:100vh; }
.panel { padding:24px; overflow-y:auto; }
.left { width:55%; border-right:1px solid #1e293b; }
.right { width:45%; display:flex; flex-direction:column; }
h1 { font-size:20px; margin-bottom:8px; }
h2 { font-size:14px; color:#94a3b8; margin-bottom:20px; }
.metric { background:#1e293b; border-radius:8px; padding:16px; margin-bottom:12px; }
.metric .page { color:#64748b; font-size:12px; }
.metric .form { display:inline-block; background:#334155; padding:2px 8px; border-radius:4px; font-size:11px; margin-left:8px; }
.metric .action { margin-top:8px; font-size:14px; line-height:1.5; }
.metric .urgency { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; margin-top:8px; }
.urgency.HIGH { background:#7f1d1d; color:#fca5a5; }
.urgency.MEDIUM { background:#78350f; color:#fcd34d; }
.urgency.LOW { background:#14532d; color:#86efac; }
.chat { flex:1; display:flex; flex-direction:column; }
.chat-messages { flex:1; overflow-y:auto; padding:16px; }
.chat-msg { margin-bottom:12px; max-width:85%; }
.chat-msg.user { margin-left:auto; }
.chat-msg.user .bubble { background:#2563eb; }
.chat-msg.assistant .bubble { background:#1e293b; }
.bubble { padding:12px 16px; border-radius:12px; font-size:14px; line-height:1.5; }
.chat-input { display:flex; padding:16px; border-top:1px solid #1e293b; }
.chat-input input { flex:1; background:#1e293b; border:none; padding:12px; border-radius:8px; color:#e2e8f0; font-size:14px; }
.chat-input button { background:#2563eb; border:none; padding:12px 20px; border-radius:8px; color:white; margin-left:8px; cursor:pointer; font-size:14px; }
.chat-input button:disabled { opacity:0.5; }
.stats { display:flex; gap:12px; margin-bottom:20px; }
.stat { background:#1e293b; border-radius:8px; padding:16px; flex:1; text-align:center; }
.stat .value { font-size:28px; font-weight:bold; }
.stat .label { font-size:12px; color:#64748b; margin-top:4px; }
.loading { color:#64748b; font-style:italic; }
</style>
</head>
<body>

<div class="panel left">
    <h1>📊 ИАфр РАН — Стратегия продвижения деловых интересов</h1>
    <h2>12 страниц → 7 C-level рекомендаций</h2>

    <div class="stats">
        <div class="stat"><div class="value">7</div><div class="label">Рекомендаций</div></div>
        <div class="stat"><div class="value">6</div><div class="label">HIGH urgency</div></div>
        <div class="stat"><div class="value">5</div><div class="label">Форм мысли</div></div>
        <div class="stat"><div class="value">MEDIUM</div><div class="label">Confidence</div></div>
    </div>

    <div id="dashboard"></div>
</div>

<div class="panel right">
    <div class="chat" id="chat">
        <div class="chat-messages" id="messages">
            <div class="chat-msg assistant">
                <div class="bubble">
                    Я — AI-ассистент, опирающийся на вычислительный граф документа.<br>
                    Спросите о страницах, рисках, рекомендациях или минеральных ресурсах Африки.
                </div>
            </div>
        </div>
        <div class="chat-input">
            <input id="query" placeholder="Спросите о документе..." onkeydown="if(event.key==='Enter')ask()">
            <button id="sendBtn" onclick="ask()">→</button>
        </div>
    </div>
</div>

<script>
// Данные графа (из дашборда)
const GRAPH = {
    pages: [
        {page:1, form:"discursive", action:"Запросить у ОКТО/РАН операционный план по 6 разделам стратегии", urgency:"HIGH"},
        {page:2, form:"enumeration", action:"Утвердить дорожную карту: блоки стратегии → KPI → инвестиционные проекты", urgency:"HIGH"},
        {page:3, form:"mixed", action:"Создать рабочую группу по пилотированию 3-5 технологических хабов в странах с лояльным голосованием в ООН", urgency:"HIGH"},
        {page:4, form:"mixed", action:"Провести аудит российских метрик присутствия в 3 приоритетных зонах Африки за 30 дней", urgency:"HIGH"},
        {page:5, form:"hierarchy", action:"РФ позиционируется как великая держава — авангард анти-неоколониального движения", urgency:"MEDIUM"},
        {page:6, form:"mixed", action:"Утвердить регламент «африканского трека»: рабочая группа + Институт Африки РАН", urgency:"HIGH"},
        {page:9, form:"topology", action:"Создать корпоративно-государственный консорциум для оффтейк-контрактов по олову, хрому, урану", urgency:"HIGH"},
    ],
    ontology: {
        page9: {
            entities: [
                {name:"США", type:"Геополитический актор", role:"Стратегический конкурент за ресурсы Африки"},
                {name:"ЕС", type:"Геополитический актор", role:"Стратегический конкурент за ресурсы Африки"},
                {name:"Китай", type:"Геополитический актор", role:"Стратегический конкурент за ресурсы Африки"},
                {name:"Африка", type:"Регион-источник", role:"Глобальный поставщик критического сырья (15% мирового производства)"},
                {name:"Бокситы", type:"Критический минерал", role:"Доминирующий ресурс (74% мировых)"},
                {name:"Кобальт", type:"Критический минерал", role:"ДРК — 74% мирового производства"},
                {name:"Графит", type:"Критический минерал", role:"10% мирового производства"},
            ],
            relations: [
                {from:"США", to:"Африка", type:"КОНКУРИРУЕТ_ЗА"},
                {from:"ЕС", to:"Африка", type:"КОНКУРИРУЕТ_ЗА"},
                {from:"Китай", to:"Африка", type:"КОНКУРИРУЕТ_ЗА"},
                {from:"Африка", to:"Бокситы", type:"ДОМИНИРУЕТ_В (74%)"},
                {from:"Китай", to:"Кобальт", type:"КОНТРОЛИРУЕТ (60% переработки)"},
            ],
            model: "Геополитические акторы конкурируют за контроль над критическими минеральными ресурсами Африки"
        }
    },
    risks: [
        "Вытеснение России конкурентами (США, ЕС, Китай) из-за более высокого позиционного индекса",
        "Эксклюзивные сделки с западными/китайскими операторами, блокирующие доступ к активам",
        "Высокая концентрация рынка (бокситы 74%) ограничивает возможности для нового входа",
    ],
    opportunities: [
        "Глобальный тренд на диверсификацию цепочек поставок",
        "Окно для заключения долгосрочных оффтейк-соглашений",
        "Суверенное финансирование и дипломатический ресурс для быстрого захвата долей",
    ],
};

// Рендер дашборда
function renderDashboard() {
    const el = document.getElementById('dashboard');
    GRAPH.pages.forEach(p => {
        el.innerHTML += `
            <div class="metric">
                <span class="page">Стр. ${p.page}</span>
                <span class="form">${p.form}</span>
                <span class="urgency ${p.urgency}">${p.urgency}</span>
                <div class="action">${p.action}</div>
            </div>`;
    });
}
renderDashboard();

// Чат
async function ask() {
    const input = document.getElementById('query');
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    
    const msgs = document.getElementById('messages');
    msgs.innerHTML += `<div class="chat-msg user"><div class="bubble">${q}</div></div>`;
    msgs.innerHTML += `<div class="chat-msg assistant"><div class="bubble loading">Анализирую граф...</div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
    
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    
    const graphContext = JSON.stringify(GRAPH, null, 2);
    const prompt = `[РОЛЬ] Аналитик графа знаний
[ПРЕДМЕТ] Документ «Стратегия ИАфр РАН» — 12 страниц
[ПРАВИЛА] Отвечай ТОЛЬКО на основе данных графа. Если данных недостаточно — честно скажи.
[ОГРАНИЧЕНИЕ] Не выдумывай. Только граф.

## ГРАФ ДОКУМЕНТА
${graphContext}

## ВОПРОС
${q}`;

    try {
        const resp = await fetch('http://localhost:11434/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                model: 'qwen3.6:35b',
                messages: [{role: 'user', content: prompt}],
                max_tokens: 1024,
                temperature: 0.1,
                stream: false,
            }),
        });
        const data = await resp.json();
        const answer = data.message.content;
        
        // Убираем loading
        const bubbles = msgs.querySelectorAll('.bubble');
        bubbles[bubbles.length - 1].textContent = answer;
        bubbles[bubbles.length - 1].classList.remove('loading');
    } catch(e) {
        const bubbles = msgs.querySelectorAll('.bubble');
        bubbles[bubbles.length - 1].textContent = 'Ошибка: ' + e.message;
        bubbles[bubbles.length - 1].classList.remove('loading');
    }
    
    btn.disabled = false;
    msgs.scrollTop = msgs.scrollHeight;
}
</script>
</body>
</html>
